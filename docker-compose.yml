services:
  app:
    build: .
    image: garmentsos-pro:local
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      RUN_MIGRATIONS_ON_START: "${RUN_MIGRATIONS_ON_START:-false}"
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
    restart: unless-stopped
