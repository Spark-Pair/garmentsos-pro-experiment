name: garmentsos-pro

services:
  app:
    image: "${GARMENTSOS_IMAGE:-sparkpair/garmentsos-pro:local}"
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      RUN_MIGRATIONS_ON_START: "${RUN_MIGRATIONS_ON_START:-false}"
    volumes:
      - ./.env:/var/www/html/.env:ro
      - garmentsos_database:/var/www/html/database/runtime
      - garmentsos_storage:/var/www/html/storage
    restart: unless-stopped

volumes:
  garmentsos_database:
  garmentsos_storage:
