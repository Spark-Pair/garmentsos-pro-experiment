name: Publish GarmentsOS PRO Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.8.14"
        required: true
        type: string
      channel:
        description: "Update channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - dev
      mandatory:
        description: "Mark this update as mandatory"
        required: true
        default: false
        type: boolean
      min_launcher_version:
        description: "Minimum launcher version required for this release"
        required: true
        default: "1.8.11"
        type: string
      release_notes:
        description: "Release notes shown in latest.json and GitHub Release"
        required: true
        type: string
      prerelease:
        description: "Publish as a GitHub prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish release
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ inputs.version }}
      CHANNEL: ${{ inputs.channel }}
      MANDATORY: ${{ inputs.mandatory }}
      MIN_LAUNCHER_VERSION: ${{ inputs.min_launcher_version }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      PRERELEASE: ${{ inputs.prerelease }}
      GH_TOKEN: ${{ github.token }}
      PUBLIC_DOWNLOAD_BASE_URL: https://www.sparkpair.dev/api/downloads/garmentsos-pro

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up .NET for Windows launcher
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Ensure archive tools are available
        run: |
          sudo apt-get update
          sudo apt-get install -y zip pipx
          pipx install awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Publish Windows GUI launcher
        id: launcher
        run: |
          dotnet publish launcher/GarmentsOS.Setup/GarmentsOS.Setup.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Prepare client EXE asset
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="launcher/GarmentsOS.Setup/bin/Release/net8.0-windows/win-x64/publish"
          echo "Publish directory: ${publish_dir}"
          find "$publish_dir" -maxdepth 1 -type f -printf '%p %s bytes\n' | sort

          launcher_exe="${publish_dir}/GarmentsOS-PRO.exe"
          if [[ ! -f "$launcher_exe" && -f "${publish_dir}/GarmentsOS PRO Launcher.exe" ]]; then
            launcher_exe="${publish_dir}/GarmentsOS PRO Launcher.exe"
          fi

          if [[ ! -f "$launcher_exe" ]]; then
            echo "GarmentsOS-PRO.exe was not found in the self-contained publish directory." >&2
            exit 1
          fi

          cp "$launcher_exe" GarmentsOS-PRO.exe
          exe_size="$(wc -c < GarmentsOS-PRO.exe | tr -d '[:space:]')"
          exe_sha256="$(sha256sum GarmentsOS-PRO.exe | awk '{print $1}')"
          echo "Selected launcher EXE: $launcher_exe"
          echo "Prepared client asset: GarmentsOS-PRO.exe"
          echo "GarmentsOS-PRO.exe size: ${exe_size} bytes"
          echo "GarmentsOS-PRO.exe sha256: ${exe_sha256}"

          if (( exe_size < 20 * 1024 * 1024 )); then
            echo "GarmentsOS-PRO.exe is too small for a self-contained launcher. Refusing to publish likely stub EXE." >&2
            exit 1
          fi

      - name: Build Docker release package
        env:
          UPDATE_CHANNEL: ${{ env.CHANNEL }}
          RELEASE_MANDATORY: ${{ env.MANDATORY }}
          RELEASE_MIN_LAUNCHER_VERSION: ${{ env.MIN_LAUNCHER_VERSION }}
        run: |
          scripts/docker-build-release.sh "$VERSION" --allow-dirty

      - name: Locate release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          package=""
          for candidate in \
            "docker-releases/garmentsos-pro-${VERSION}.tar.gz" \
            "docker-releases/garmentsos-pro-${VERSION}.zip" \
            "docker-releases/garmentsos-pro-${VERSION}.tar"; do
            if [[ -f "$candidate" ]]; then
              package="$candidate"
              break
            fi
          done

          if [[ -z "$package" ]]; then
            echo "Release archive was not found." >&2
            exit 1
          fi

          checksum="docker-releases/garmentsos-pro-${VERSION}.sha256"
          if [[ ! -f "$checksum" ]]; then
            echo "Release checksum was not found: $checksum" >&2
            exit 1
          fi

          setup_asset="GarmentsOS-PRO.exe"
          if [[ ! -f "$setup_asset" ]]; then
            echo "GarmentsOS-PRO.exe was not found. The client EXE asset is required." >&2
            exit 1
          fi

          exe_size="$(wc -c < "$setup_asset" | tr -d '[:space:]')"
          echo "Release client EXE asset: $setup_asset (${exe_size} bytes)"
          sha256sum "$setup_asset"
          if (( exe_size < 20 * 1024 * 1024 )); then
            echo "GarmentsOS-PRO.exe is too small for a self-contained launcher. Refusing release." >&2
            exit 1
          fi

          {
            echo "package=$package"
            echo "package_file=$(basename "$package")"
            echo "checksum=$checksum"
            echo "checksum_file=$(basename "$checksum")"
            echo "setup_asset=$setup_asset"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release package to R2/S3 storage
        id: storage
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          PACKAGE_FILE: ${{ steps.assets.outputs.package_file }}
          CHECKSUM_FILE: ${{ steps.assets.outputs.checksum_file }}
          SETUP_ASSET: ${{ steps.assets.outputs.setup_asset }}
        run: |
          set -euo pipefail

          public_package_url="${PUBLIC_DOWNLOAD_BASE_URL}/${VERSION}"
          public_setup_url="${PUBLIC_DOWNLOAD_BASE_URL}/${VERSION}/setup"

          missing=()
          [[ -n "${R2_ACCOUNT_ID:-}" ]] || missing+=("R2_ACCOUNT_ID")
          [[ -n "${R2_ACCESS_KEY_ID:-}" ]] || missing+=("R2_ACCESS_KEY_ID")
          [[ -n "${R2_SECRET_ACCESS_KEY:-}" ]] || missing+=("R2_SECRET_ACCESS_KEY")
          [[ -n "${R2_BUCKET:-}" ]] || missing+=("R2_BUCKET")

          if (( ${#missing[@]} > 0 )); then
            echo "::warning::R2/S3 storage upload skipped. Missing secrets: ${missing[*]}"
            {
              echo "bucket="
              echo "package_key="
              echo "checksum_key="
              echo "setup_key="
              echo "storage_package_url="
              echo "storage_setup_url="
              echo "public_package_url=${public_package_url}"
              echo "public_setup_url=${public_setup_url}"
            } >> "$GITHUB_OUTPUT"

            echo "SparkPair public package URL: ${public_package_url}"
            echo "Using GitHub private release fallback through SparkPair server proxy."
            exit 0
          fi

          endpoint_url="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          object_prefix="garmentsos-pro/${CHANNEL}/${VERSION}"
          package_key="${object_prefix}/${PACKAGE_FILE}"
          checksum_key="${object_prefix}/${CHECKSUM_FILE}"
          setup_key="${object_prefix}/GarmentsOS-PRO.exe"

          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_DEFAULT_REGION="auto"

          aws s3 cp "docker-releases/${PACKAGE_FILE}" "s3://${R2_BUCKET}/${package_key}" --endpoint-url "${endpoint_url}" --only-show-errors
          aws s3 cp "docker-releases/${CHECKSUM_FILE}" "s3://${R2_BUCKET}/${checksum_key}" --endpoint-url "${endpoint_url}" --only-show-errors
          aws s3 cp "${SETUP_ASSET}" "s3://${R2_BUCKET}/${setup_key}" --endpoint-url "${endpoint_url}" --only-show-errors

          public_object_base="${R2_PUBLIC_BASE_URL%/}"
          storage_package_url=""
          storage_setup_url=""
          if [[ -n "${public_object_base}" ]]; then
            storage_package_url="${public_object_base}/${package_key}"
            storage_setup_url="${public_object_base}/${setup_key}"
          fi

          {
            echo "bucket=${R2_BUCKET}"
            echo "package_key=${package_key}"
            echo "checksum_key=${checksum_key}"
            echo "setup_key=${setup_key}"
            echo "storage_package_url=${storage_package_url}"
            echo "storage_setup_url=${storage_setup_url}"
            echo "public_package_url=${public_package_url}"
            echo "public_setup_url=${public_setup_url}"
          } >> "$GITHUB_OUTPUT"

          echo "Uploaded release package to storage key: ${package_key}"
          echo "SparkPair public package URL: ${public_package_url}"

      - name: Generate published latest.json
        shell: bash
        env:
          PACKAGE_FILE: ${{ steps.assets.outputs.package_file }}
          CHECKSUM_FILE: ${{ steps.assets.outputs.checksum_file }}
          SETUP_ASSET: ${{ steps.assets.outputs.setup_asset }}
          PACKAGE_URL: ${{ steps.storage.outputs.public_package_url }}
          SETUP_URL: ${{ steps.storage.outputs.public_setup_url }}
        run: |
          set -euo pipefail

          export package_sha256
          export released_at

          package_sha256="$(sha256sum "docker-releases/${PACKAGE_FILE}" | awk '{print $1}')"
          released_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          python - <<'PY'
          import json
          import os

          data = {
              "app": "garmentsos-pro",
              "version": os.environ["VERSION"],
              "channel": os.environ["CHANNEL"],
              "mandatory": os.environ["MANDATORY"].lower() == "true",
              "released_at": os.environ["released_at"],
              "package_file": os.environ["PACKAGE_FILE"],
              "package_sha256_file": os.environ["CHECKSUM_FILE"],
              "package_sha256": os.environ["package_sha256"],
              "sha256": os.environ["package_sha256"],
              "package_url": os.environ["PACKAGE_URL"],
              "setup_url": os.environ["SETUP_URL"],
              "min_launcher_version": os.environ["MIN_LAUNCHER_VERSION"],
              "notes": os.environ["RELEASE_NOTES"],
          }

          with open("docker-releases/latest.json", "w", encoding="utf-8") as handle:
              json.dump(data, handle, indent=2)
              handle.write("\n")
          PY

      - name: Create release notes file
        shell: bash
        run: |
          {
            echo "$RELEASE_NOTES"
            echo
            echo "Assets:"
            echo "- ${{ steps.assets.outputs.package_file }}"
            echo "- ${{ steps.assets.outputs.checksum_file }}"
            echo "- latest.json"
            if [[ -n "${{ steps.assets.outputs.setup_asset }}" ]]; then
              echo "- GarmentsOS-PRO.exe"
            else
              echo "- GarmentsOS-PRO.exe missing: release should fail before upload."
            fi
          } > release-notes.md

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag=""
          if [[ "$CHANNEL" != "stable" ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "v${VERSION}" \
            "${{ steps.assets.outputs.package }}" \
            "${{ steps.assets.outputs.checksum }}" \
            "docker-releases/latest.json" \
            --title "GarmentsOS PRO ${VERSION}" \
            --notes-file release-notes.md \
            $prerelease_flag

      - name: Upload client EXE asset if present
        if: ${{ steps.assets.outputs.setup_asset != '' }}
        shell: bash
        run: |
          gh release upload "v${VERSION}" "${{ steps.assets.outputs.setup_asset }}" --clobber

      - name: Publish channel latest feed
        shell: bash
        run: |
          set -euo pipefail

          channel_tag="latest-${CHANNEL}"
          if ! gh release view "$channel_tag" >/dev/null 2>&1; then
            gh release create "$channel_tag" \
              --title "GarmentsOS PRO latest ${CHANNEL} feed" \
              --notes "Moving ${CHANNEL} channel feed for GarmentsOS PRO. The latest.json asset points to the current ${CHANNEL} release package."
          fi

          gh release upload "$channel_tag" "docker-releases/latest.json" --clobber

      - name: Sync release to SparkPair site
        shell: bash
        env:
          SPARKPAIR_RELEASE_WEBHOOK_SECRET: ${{ secrets.SPARKPAIR_RELEASE_WEBHOOK_SECRET }}
          PACKAGE_FILE: ${{ steps.assets.outputs.package_file }}
          SETUP_ASSET: ${{ steps.assets.outputs.setup_asset }}
          PUBLIC_PACKAGE_URL: ${{ steps.storage.outputs.public_package_url }}
          PUBLIC_SETUP_URL: ${{ steps.storage.outputs.public_setup_url }}
          STORAGE_BUCKET: ${{ steps.storage.outputs.bucket }}
          STORAGE_PACKAGE_KEY: ${{ steps.storage.outputs.package_key }}
          STORAGE_CHECKSUM_KEY: ${{ steps.storage.outputs.checksum_key }}
          STORAGE_SETUP_KEY: ${{ steps.storage.outputs.setup_key }}
          STORAGE_PACKAGE_URL: ${{ steps.storage.outputs.storage_package_url }}
          STORAGE_SETUP_URL: ${{ steps.storage.outputs.storage_setup_url }}
        run: |
          set -euo pipefail

          sync_url="https://www.sparkpair.dev/api/admin/releases/sync-github"
          public_feed_url="https://www.sparkpair.dev/api/updates/garmentsos-pro/${CHANNEL}/latest.json"

          echo "SparkPair sync URL configured: yes"
          if [[ -n "${SPARKPAIR_RELEASE_WEBHOOK_SECRET:-}" ]]; then
            echo "SparkPair sync secret configured: yes"
          else
            echo "SparkPair sync secret configured: no"
          fi

          if [[ -z "${SPARKPAIR_RELEASE_WEBHOOK_SECRET:-}" ]]; then
            message="SparkPair release sync skipped because SPARKPAIR_RELEASE_WEBHOOK_SECRET is not configured."
            if [[ "$CHANNEL" == "stable" ]]; then
              echo "::error::$message"
              exit 1
            fi
            echo "::warning::$message"
            exit 0
          fi

          package_sha256="$(sha256sum "docker-releases/${PACKAGE_FILE}" | awk '{print $1}')"
          released_at="$(python - <<'PY'
          import json
          with open("docker-releases/latest.json", encoding="utf-8") as handle:
              print(json.load(handle).get("released_at", ""))
          PY
          )"

          export package_sha256 released_at

          python - <<'PY'
          import json
          import os

          payload = {
              "product": "garmentsos-pro",
              "version": os.environ["VERSION"],
              "channel": os.environ["CHANNEL"],
              "mandatory": os.environ["MANDATORY"].lower() == "true",
              "released_at": os.environ["released_at"],
              "package_file": os.environ["PACKAGE_FILE"],
              "package_url": os.environ["PUBLIC_PACKAGE_URL"],
              "package_sha256": os.environ["package_sha256"],
              "setup_url": os.environ["PUBLIC_SETUP_URL"],
              "storage": {
                  "provider": "r2",
                  "bucket": os.environ["STORAGE_BUCKET"],
                  "package_key": os.environ["STORAGE_PACKAGE_KEY"],
                  "checksum_key": os.environ["STORAGE_CHECKSUM_KEY"],
                  "setup_key": os.environ["STORAGE_SETUP_KEY"],
                  "package_url": os.environ.get("STORAGE_PACKAGE_URL", ""),
                  "setup_url": os.environ.get("STORAGE_SETUP_URL", ""),
              },
              "github_release_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/tag/v{os.environ['VERSION']}",
              "notes": os.environ["RELEASE_NOTES"],
          }

          with open("sparkpair-release-sync-payload.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY

          response_body="$(mktemp)"
          http_status="$(curl --location --show-error --silent \
            --output "$response_body" \
            --write-out "%{http_code}" \
            --request POST "${sync_url}" \
            --header "Authorization: Bearer ${SPARKPAIR_RELEASE_WEBHOOK_SECRET}" \
            --header "Content-Type: application/json" \
            --data @sparkpair-release-sync-payload.json)"

          echo "SparkPair sync HTTP status: ${http_status}"

          fail_sync() {
            local message="$1"
            echo "::error::${message}"
            echo "SparkPair response body (first 2000 chars):"
            head -c 2000 "$response_body" || true
            echo
            if [[ "$CHANNEL" == "stable" ]]; then
              exit 1
            fi
            echo "::warning::SparkPair sync failed for ${CHANNEL}; continuing because non-stable sync is warning-only."
            exit 0
          }

          if [[ ! "$http_status" =~ ^2[0-9][0-9]$ ]]; then
            fail_sync "SparkPair release sync returned non-2xx HTTP status."
          fi

          if [[ ! -s "$response_body" ]]; then
            fail_sync "SparkPair release sync response body was empty."
          fi

          if grep -qi "Redirecting" "$response_body"; then
            fail_sync "SparkPair release sync returned a redirect body instead of JSON."
          fi

          if ! python - "$response_body" "$VERSION" <<'PY'
          import json
          import sys

          path, expected = sys.argv[1], sys.argv[2]
          with open(path, encoding="utf-8") as handle:
              data = json.load(handle)

          release = data.get("release")
          if not isinstance(release, dict):
              raise SystemExit("missing release object")

          version = str(release.get("version", ""))
          if not version:
              raise SystemExit("missing release.version")

          if version != expected:
              raise SystemExit(f"release.version mismatch: {version} != {expected}")
          PY
          then
            fail_sync "SparkPair release sync response JSON was invalid or did not contain matching release.version."
          fi

          echo "SparkPair release sync completed."

          feed_body="$(mktemp)"
          feed_status="$(curl --location --show-error --silent \
            --output "$feed_body" \
            --write-out "%{http_code}" \
            "${public_feed_url}" || true)"
          echo "SparkPair feed verification HTTP status: ${feed_status}"

          if [[ "$CHANNEL" == "stable" ]]; then
            if [[ ! "$feed_status" =~ ^2[0-9][0-9]$ || ! -s "$feed_body" ]]; then
              echo "::error::SparkPair stable feed could not be fetched after sync."
              head -c 2000 "$feed_body" || true
              exit 1
            fi

            if ! python - "$feed_body" "$VERSION" <<'PY'
          import json
          import sys

          path, expected = sys.argv[1], sys.argv[2]
          with open(path, encoding="utf-8") as handle:
              data = json.load(handle)

          version = str(data.get("version", ""))
          if version != expected:
              raise SystemExit(f"feed version mismatch: {version} != {expected}")
          PY
            then
              echo "::error::SparkPair stable feed version does not match release version."
              head -c 2000 "$feed_body" || true
              exit 1
            fi

            echo "SparkPair stable feed version verified: ${VERSION}"
          fi

          package_download="$(mktemp)"
          package_status="$(curl --location --show-error --silent \
            --output "$package_download" \
            --write-out "%{http_code}" \
            "${PUBLIC_PACKAGE_URL}" || true)"
          echo "SparkPair package download verification HTTP status: ${package_status}"

          if [[ "$package_status" != "200" || ! -s "$package_download" ]]; then
            echo "::error::Final SparkPair package URL is not downloadable."
            echo "URL: ${PUBLIC_PACKAGE_URL}"
            exit 1
          fi

          downloaded_sha256="$(sha256sum "$package_download" | awk '{print $1}')"
          if [[ "${downloaded_sha256}" != "${package_sha256}" ]]; then
            echo "::error::Final SparkPair package SHA256 mismatch."
            echo "Expected: ${package_sha256}"
            echo "Actual:   ${downloaded_sha256}"
            exit 1
          fi

          echo "SparkPair package download verified: ${PUBLIC_PACKAGE_URL}"

      - name: Save public feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: garmentsos-pro-${{ env.CHANNEL }}-latest-feed
          path: docker-releases/latest.json

      - name: Write workflow summary
        shell: bash
        run: |
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}"
          version_latest_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/latest.json"
          channel_latest_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/latest-${CHANNEL}/latest.json"
          public_feed_url="https://www.sparkpair.dev/api/updates/garmentsos-pro/${CHANNEL}/latest.json"
          public_package_url="${PUBLIC_DOWNLOAD_BASE_URL}/${VERSION}"
          {
            echo "## GarmentsOS PRO release published"
            echo
            echo "- Version: \`${VERSION}\`"
            echo "- Channel: \`${CHANNEL}\`"
            echo "- Mandatory: \`${MANDATORY}\`"
            echo "- Release: ${release_url}"
            echo "- Version latest.json: ${version_latest_url}"
            echo "- Channel feed latest.json: ${channel_latest_url}"
            echo "- Public feed target: ${public_feed_url}"
            echo "- Public package download: ${public_package_url}"
            echo
            echo "Set installed apps to use this feed URL when update checks are enabled:"
            echo
            echo "\`\`\`env"
            echo "UPDATE_FEED_URL=${public_feed_url}"
            echo "UPDATE_CHANNEL=${CHANNEL}"
            echo
            echo "# GitHub channel asset also exists, but private repos return 404 to unauthenticated clients:"
            echo "# ${channel_latest_url}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
